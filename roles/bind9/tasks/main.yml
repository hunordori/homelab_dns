---
- name: Install BIND9 and utilities
  apt:
    name:
      - bind9
      - bind9utils
      - bind9-dnsutils
    state: present
    update_cache: yes

- name: Check BIND9 version for DoH/DoT support
  command: named -v
  register: named_version
  changed_when: false
  when: doh_enabled | default(false)

- name: Assert BIND9 version is 9.18 or later
  assert:
    that:
      - named_version.stdout | regex_search('BIND ([0-9]+\\.[0-9]+)', '\\1') | first | float >= 9.18
    fail_msg: "BIND 9.18+ required for DoH/DoT. Found: {{ named_version.stdout }}"
  when: doh_enabled | default(false) and named_version is not skipped

- name: Set up TLS certificates for DoH/DoT
  include_tasks: doh-certs.yml
  when: doh_enabled | default(false)

- name: Create BIND9 log directory
  file:
    path: /var/log/named
    state: directory
    owner: bind
    group: bind
    mode: "0755"

- name: Create zone directory (master only)
  file:
    path: "{{ bind9_zone_dir }}"
    state: directory
    owner: bind
    group: bind
    mode: "0755"
  when: bind9_role == "master"

- name: Deploy BIND9 global options
  template:
    src: named.conf.options.j2
    dest: /etc/bind/named.conf.options
    owner: root
    group: bind
    mode: "0644"
  notify: restart bind9

- name: Deploy TSIG key file
  template:
    src: tsig-key.j2
    dest: /etc/bind/tsig-key.conf
    owner: root
    group: bind
    mode: "0640"
  notify: reload bind9

- name: Deploy zone declarations
  template:
    src: named.conf.local.j2
    dest: /etc/bind/named.conf.local
    owner: root
    group: bind
    mode: "0644"
  notify: reload bind9

# --- Master-only tasks: deploy zone files ---

- name: Deploy zone files (master only)
  template:
    src: zone.j2
    dest: "{{ bind9_zone_dir }}/{{ item.key }}.zone"
    owner: bind
    group: bind
    mode: "0644"
    validate: "named-checkzone {{ item.key }} %s"
  loop: "{{ dns_zones | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: bind9_role == "master"
  notify: reload bind9

- name: Ensure BIND9 is enabled and running
  service:
    name: named
    state: started
    enabled: yes

- name: Deploy bind_exporter for Prometheus monitoring
  include_tasks: bind-exporter.yml
  when: bind9_stats_enabled | default(false)
